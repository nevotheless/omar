[Distribution]
Distribution=arch
Release=latest
RepositoryKeyCheck=no

[Output]
Format=oci
OutputDirectory=output
ImageId=omar

[Content]
# Core system packages
Packages=linux
Packages=linux-firmware
Packages=amd-ucode
Packages=intel-ucode
Packages=systemd
Packages=systemd-boot
Packages=systemd-ukify
Packages=dbus-broker
Packages=udev
Packages=btrfs-progs
Packages=dosfstools
Packages=efibootmgr
Packages=reflector
Packages=openssh
Packages=networkmanager
Packages=wpa_supplicant
Packages=sudo
Packages=pacman-contrib
Packages=base-devel
Packages=git
Packages=vim
# Immutable OS packages
Packages=flatpak
Packages=distrobox
Packages=bootc
Bootable=no
ExtraTrees=mkosi.extra
# TODO: Add Bootable=yes + UnifiedKernelImages=yes once p11-kit initrd issue is resolved
Locale=en_US.UTF-8
Timezone=UTC
Keymap=us
Hostname=omar

[Build]
ToolsTree=default
ToolsTreePackages=archlinux-keyring
CacheDirectory=mkosi.cache
BuildDirectory=mkosi.builddir
Incremental=yes
WithNetwork=yes
