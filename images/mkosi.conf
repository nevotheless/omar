[Distribution]
Distribution=arch
Release=latest
Mirror=https://geo.mirror.pkgbuild.com/
RepositoryKeyFetch=yes

[Output]
Format=oci
OutputDirectory=output
ImageId=omar

[Content]
# Package list is generated from packages/*.txt by generate-package-configs.sh
# and placed in mkosi.conf.d/packages.conf
Bootable=yes
ExtraTrees=mkosi.extra
Environment=SYSTEMD_OFFLINE=1
Locale=en_US.UTF-8
Timezone=UTC
Keymap=us
Hostname=omar

[Build]
ToolsTree=default
CacheDirectory=mkosi.cache
BuildDirectory=mkosi.builddir
Incremental=yes
WithNetwork=yes
