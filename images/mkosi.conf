[Distribution]
Distribution=arch
Release=latest
RepositoryKeyCheck=no

[Output]
Format=oci
OutputDirectory=output
ImageId=omar

[Content]
PackageDirectories=packages
Packages=@base.txt
Packages=@immutable.txt
Bootable=no
ExtraTrees=mkosi.extra
# TODO: Add Bootable=yes + UnifiedKernelImages=yes once p11-kit initrd issue is resolved
Locale=en_US.UTF-8
Timezone=UTC
Keymap=us
Hostname=omar

[Build]
ToolsTree=default
ToolsTreePackages=archlinux-keyring
CacheDirectory=mkosi.cache
BuildDirectory=mkosi.builddir
Incremental=yes
WithNetwork=yes
