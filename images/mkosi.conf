[Distribution]
Distribution=arch
Release=latest
Mirror=https://geo.mirror.pkgbuild.com/
RepositoryKeyFetch=yes

[Output]
Format=oci
OutputDirectory=output
ImageId=omar

[Content]
# Core system packages
Packages=linux
Packages=linux-firmware
Packages=amd-ucode
Packages=intel-ucode
Packages=systemd
# systemd-boot and systemd-ukify are included in systemd
Packages=dbus-broker
Packages=udev
Packages=btrfs-progs
Packages=dosfstools
Packages=efibootmgr
Packages=reflector
Packages=openssh
Packages=networkmanager
Packages=wpa_supplicant
Packages=sudo
Packages=pacman-contrib
Packages=base-devel
Packages=git
Packages=vim
# Dependencies for postinst (Chaotic-AUR key import, URL downloads)
Packages=gnupg
Packages=curl
# Immutable OS packages
Packages=flatpak
Packages=distrobox
Bootable=yes
ExtraTrees=mkosi.extra
Environment=SYSTEMD_OFFLINE=1
Locale=en_US.UTF-8
Timezone=UTC
Keymap=us
Hostname=omar

[Build]
ToolsTree=default
CacheDirectory=mkosi.cache
BuildDirectory=mkosi.builddir
Incremental=yes
WithNetwork=yes
