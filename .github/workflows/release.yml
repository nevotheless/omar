name: release
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build binaries
        run: |
          GOOS=linux GOARCH=amd64 go build -o omar-linux-amd64 ./cmd/omar
          GOOS=linux GOARCH=arm64 go build -o omar-linux-arm64 ./cmd/omar

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            omar-linux-amd64
            omar-linux-arm64
