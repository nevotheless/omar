name: release
on:
  push:
    tags:
      - 'v*'

env:
  VERSION: ${{ github.ref_name }}
  REGISTRY: ghcr.io/nevotheless/omar

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Test (race detection)
        run: go test ./... -race -count=1
      - name: Vet
        run: go vet ./...
      - name: Coverage
        run: |
          go test ./... -coverprofile=coverage.out -covermode=atomic -count=1
          go tool cover -func=coverage.out
      - name: Lint (formatting)
        run: |
          test -z "$(gofmt -l .)" || (echo "Formatting issues:"; gofmt -l .; exit 1)

  images:
    needs: [test]
    strategy:
      matrix:
        variant: [base, hyprland, omarchy]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Install OCI build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-pip python3-argcomplete \
            systemd-container skopeo debian-archive-keyring ubuntu-keyring
          sudo pip3 install git+https://github.com/systemd/mkosi.git

      - name: Build ${{ matrix.variant }} image
        run: |
          VARIANT=${{ matrix.variant }} ./images/generate-package-configs.sh
          sudo mkosi -d arch --format=oci -C images \
            --image-id=omar-${{ matrix.variant }} \
            --output-directory=output-${{ matrix.variant }} \
            --image-tag=${VERSION} \
            build
        timeout-minutes: 30

      - name: Push ${{ matrix.variant }} image
        env:
          REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          skopeo copy \
            oci:images/output-${{ matrix.variant }}/omar-${{ matrix.variant }}:${VERSION} \
            docker://${REGISTRY}:${{ matrix.variant }}-${VERSION}
          skopeo copy \
            oci:images/output-${{ matrix.variant }}/omar-${{ matrix.variant }}:${VERSION} \
            docker://${REGISTRY}:${{ matrix.variant }}-latest

  release:
    runs-on: ubuntu-24.04
    needs: [images]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build binaries
        run: |
          for arch in amd64 arm64; do
            GOOS=linux GOARCH=$arch go build \
              -ldflags="-X 'github.com/nevotheless/omar/internal/version.Version=${VERSION}'" \
              -o omar-linux-${arch} ./cmd/omar
          done

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            omar-linux-amd64
            omar-linux-arm64
