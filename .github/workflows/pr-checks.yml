name: pr-checks
on:
  pull_request:
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'go.*'
      - 'images/**'

jobs:
  cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build
        run: go build ./cmd/omar

      - name: Vet
        run: go vet ./...

      - name: Test (race detection)
        run: go test ./... -race -v -count=1

      - name: Test (coverage)
        run: |
          go test ./... -coverprofile=coverage.out -covermode=atomic -count=1
          go tool cover -func=coverage.out
          echo "### Coverage Report" >> $GITHUB_STEP_SUMMARY
          go tool cover -func=coverage.out >> $GITHUB_STEP_SUMMARY

      - name: Lint (formatting)
        run: |
          test -z "$(gofmt -l .)" || (echo "Formatting issues:"; gofmt -l .; exit 1)

  image:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip python3-argcomplete systemd-container debian-archive-keyring ubuntu-keyring
          sudo pip3 install git+https://github.com/systemd/mkosi.git

      - name: Verify package config generation (all variants)
        run: |
          VARIANT=base   ./images/generate-package-configs.sh
          VARIANT=hyprland ./images/generate-package-configs.sh
          VARIANT=omarchy ./images/generate-package-configs.sh

      - name: Clean mkosi build artifacts (disk space)
        run: |
          sudo rm -rf images/mkosi.cache images/mkosi.builddir images/output
          # Free up runner disk space
          sudo apt-get clean
          df -h /

      - name: Build image (base variant)
        run: |
          VARIANT=base ./images/generate-package-configs.sh
          sudo mkosi -d arch --format=oci -C images build --incremental=no
        timeout-minutes: 30
