name: integration-tests
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'
  pull_request:
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'tests/**'
      - 'go.*'
      - 'scripts/test-integration.sh'
      - 'Makefile'

env:
  VERSION: 2026.5.0

jobs:
  cli-smoke-tests:
    name: CLI smoke tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build CLI
        run: go build -ldflags="-X 'github.com/nevotheless/omar/internal/version.Version=${VERSION}'" -o bin/omar ./cmd/omar

      - name: CLI integration tests (Go)
        run: go test -tags=integration -count=1 -v ./tests/integration/

      - name: CLI integration tests (Shell)
        run: ./scripts/test-integration.sh --skip-build

  qemu-vm-tests:
    name: QEMU VM boot smoke test
    runs-on: ubuntu-24.04
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-pip python3-argcomplete \
            systemd-container skopeo \
            debian-archive-keyring ubuntu-keyring \
            qemu-system-x86 qemu-utils ovmf
          sudo pip3 install git+https://github.com/systemd/mkosi.git

      - name: Build base image (disk format for QEMU)
        run: |
          VARIANT=base ./images/generate-package-configs.sh
          sudo mkosi -d arch --format=disk \
            --output-directory=output-qemu \
            --image-id=omar-test \
            --image-version=v${VERSION} \
            -C images build --incremental=no
        timeout-minutes: 45

      - name: Boot VM and verify serial console output
        timeout-minutes: 4
        run: |
          DISK=$(ls output-qemu/omar-test*.raw | head -1)
          echo "Disk image: $DISK"

          # Boot headless, capture serial console (UEFI via OVMF)
          # Find OVMF firmware on system (installed via ovmf package)
          OVMF_CODE=""
          OVMF_VARS=""
          for path in /usr/share/ovmf/OVMF_CODE.fd /usr/share/OVMF/OVMF_CODE.fd; do
            if [ -f "$path" ]; then OVMF_CODE="$path"; break; fi
          done
          for path in /usr/share/ovmf/OVMF_VARS.fd /usr/share/OVMF/OVMF_VARS.fd; do
            if [ -f "$path" ]; then OVMF_VARS="$path"; break; fi
          done
          # Fallback: combined OVMF.fd (use pflash for both)
          if [ -z "$OVMF_CODE" ]; then
            OVMF_CODE=$(find /usr/share -name "OVMF_CODE.fd" 2>/dev/null | head -1)
            OVMF_VARS=$(find /usr/share -name "OVMF_VARS.fd" 2>/dev/null | head -1)
          fi
          if [ -z "$OVMF_CODE" ] || [ -z "$OVMF_VARS" ]; then
            echo "❌ OVMF split firmware not found!"
            dpkg -L ovmf 2>/dev/null || true
            exit 1
          fi
          echo "Using OVMF: code=$OVMF_CODE vars=$OVMF_VARS"
          cp "$OVMF_VARS" output-qemu/OVMF_VARS.fd  # writable copy
          sudo qemu-system-x86_64 \
            -machine q35,accel=kvm -cpu host -smp 2 -m 2G \
            -drive file="$DISK",format=raw,if=virtio \
            -drive if=pflash,format=raw,readonly=on,file="$OVMF_CODE" \
            -drive if=pflash,format=raw,file=output-qemu/OVMF_VARS.fd \
            -serial file:output-qemu/vm-serial.log \
            -display none -no-reboot -daemonize

          # Wait for kernel boot messages in serial log
          BOOT_DETECTED=false
          for i in $(seq 1 30); do
            sleep 8
            if grep -q "Linux version" output-qemu/vm-serial.log 2>/dev/null; then
              echo "✅ Kernel boot detected (attempt $i)"
              grep "Linux version" output-qemu/vm-serial.log
              BOOT_DETECTED=true
              break
            fi
            echo "Waiting for boot... ($i/30)"
          done

          if [ "$BOOT_DETECTED" = false ]; then
            echo "⚠️  No kernel boot detected – serial log:"
            cat output-qemu/vm-serial.log 2>/dev/null || echo "(empty)"
            exit 1
          fi

      - name: Show serial log (always)
        if: always()
        run: |
          echo "=== VM Serial Log ==="
          cat output-qemu/vm-serial.log 2>/dev/null || echo "(no serial log)"
          echo "=== Disk usage ==="
          du -sh output-qemu/ 2>/dev/null || true

      - name: Cleanup
        if: always()
        run: |
          sudo pkill -f "qemu.*omar" 2>/dev/null || true
          sudo rm -rf output-qemu || true
