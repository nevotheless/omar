name: build-rolling
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

env:
  VERSION: 2026.5.0
  REGISTRY: ghcr.io/nevotheless/omar
  DATE_TAG: rolling-$(date +%Y%m%d)

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Test (race detection)
        run: go test ./... -race -count=1
      - name: Vet
        run: go vet ./...
      - name: Coverage
        run: |
          go test ./... -coverprofile=coverage.out -covermode=atomic -count=1
          go tool cover -func=coverage.out
      - name: Lint (formatting)
        run: |
          test -z "$(gofmt -l .)" || (echo "Formatting issues:"; gofmt -l .; exit 1)

  base:
    needs: [test]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-pip python3-argcomplete \
            systemd-container skopeo debian-archive-keyring ubuntu-keyring
          sudo pip3 install git+https://github.com/systemd/mkosi.git

      - name: Build base variant
        run: |
          VARIANT=base ./images/generate-package-configs.sh
          sudo mkosi -d arch --format=oci -C images \
            --image-id=omar-base \
            --output-directory=output-base \
            --image-tag=v${VERSION} \
            build
        timeout-minutes: 30

      - name: Push base image
        env:
          REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          skopeo copy \
            oci:images/output-base/omar-base:v${VERSION} \
            docker://${REGISTRY}:base-rolling-$(date +%Y%m%d)
          skopeo copy \
            oci:images/output-base/omar-base:v${VERSION} \
            docker://${REGISTRY}:base-rolling

  hyprland:
    needs: [test]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-pip python3-argcomplete \
            systemd-container skopeo debian-archive-keyring ubuntu-keyring
          sudo pip3 install git+https://github.com/systemd/mkosi.git

      - name: Build hyprland variant
        run: |
          VARIANT=hyprland ./images/generate-package-configs.sh
          sudo mkosi -d arch --format=oci -C images \
            --image-id=omar-hyprland \
            --output-directory=output-hyprland \
            --image-tag=v${VERSION} \
            build
        timeout-minutes: 30

      - name: Push hyprland image
        env:
          REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          skopeo copy \
            oci:images/output-hyprland/omar-hyprland:v${VERSION} \
            docker://${REGISTRY}:hyprland-rolling-$(date +%Y%m%d)
          skopeo copy \
            oci:images/output-hyprland/omar-hyprland:v${VERSION} \
            docker://${REGISTRY}:hyprland-rolling

  full:
    needs: [test]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-pip python3-argcomplete \
            systemd-container skopeo debian-archive-keyring ubuntu-keyring
          sudo pip3 install git+https://github.com/systemd/mkosi.git

      - name: Clean mkosi cache (disk space)
        run: sudo rm -rf images/mkosi.cache images/mkosi.builddir images/output*

      - name: Build full variant
        run: |
          VARIANT=full ./images/generate-package-configs.sh
          sudo mkosi -d arch --format=oci -C images \
            --image-id=omar-full \
            --output-directory=output-full \
            --image-tag=v${VERSION} \
            build --incremental=no
        timeout-minutes: 30

      - name: Push full image
        env:
          REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          skopeo copy \
            oci:images/output-full/omar-full:v${VERSION} \
            docker://${REGISTRY}:full-rolling-$(date +%Y%m%d)
          skopeo copy \
            oci:images/output-full/omar-full:v${VERSION} \
            docker://${REGISTRY}:full-rolling

  cli:
    runs-on: ubuntu-24.04
    needs: [base, hyprland, full]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - run: |
          go build -ldflags="-X 'github.com/nevotheless/omar/internal/version.Version=v${VERSION}'" \
            -o omar-linux-amd64 ./cmd/omar
      - uses: actions/upload-artifact@v4
        with:
          name: omar-linux-amd64
          path: omar-linux-amd64
