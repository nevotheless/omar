name: build-rolling
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

env:
  VERSION: 2026.5.0

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-pip python3-argcomplete \
            systemd-container skopeo distribution-gpg-keys
          sudo pip3 install git+https://github.com/systemd/mkosi.git

      - name: Build OCI image
        run: |
          sudo mkosi -d arch --format=oci \
            -C images \
            --image-tag=v${VERSION} \
            build
        timeout-minutes: 30

      - name: Push to registry
        env:
          REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          IMAGE="ghcr.io/nevotheless/omar"
          skopeo copy \
            oci:images/output/omar:v${VERSION} \
            docker://${IMAGE}:rolling-$(date +%Y%m%d)
          skopeo copy \
            oci:images/output/omar:v${VERSION} \
            docker://${IMAGE}:rolling

      - name: Build CLI binaries
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - run: |
          go build -ldflags="-X 'github.com/nevotheless/omar/internal/version.Version=v${VERSION}'" \
            -o omar-linux-amd64 ./cmd/omar

      - uses: actions/upload-artifact@v4
        with:
          name: omar-linux-amd64
          path: omar-linux-amd64
